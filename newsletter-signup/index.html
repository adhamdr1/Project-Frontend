<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter Signup</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <div class="icon-container">
        <i class="far fa-envelope-open"></i>
      </div>
      <div class="subscribe">
        <h1>Join Our Newsletter</h1>
        <p>Get the latest updates and coding tips straight to your inbox.</p>
        <form
          action="https://example.com/subscribe"
          method="POST"
          class="signup-form"
        >
          <div class="input-group">
            <i class="fa-solid fa-envelope icon"></i>
            <input
              type="email"
              name="email"
              aria-label="Email Address"
              placeholder="Enter Your Email "
              required
            />
          </div>
          <button type="submit">
            Subscribe <i class="fas fa-arrow-right"></i>
          </button>
        </form>
      </div>
      <hr class="divider" />
      <div class="benefits">
        <p class="benefit-item">
          <i class="fas fa-check"></i> Weekly coding tips
        </p>
        <p class="benefit-item">
          <i class="fas fa-check"></i> No spam, unsubscribe anytime
        </p>
      </div>
    </div>
  </body>
</html>
